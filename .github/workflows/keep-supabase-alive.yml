name: Keep Supabase Alive

# Hace ping a Supabase cada 5 dias para evitar que el proyecto free se pause.
# Supabase pausa proyectos con 7+ dias de inactividad. 90 dias pausado = borrado.

on:
  schedule:
    # Corre cada 5 dias a las 9 AM UTC
    - cron: "0 9 */5 * *"
  workflow_dispatch: # Permite correrlo manualmente desde GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase health endpoint
        run: |
          curl -fsS "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            || (echo "Ping fallo" && exit 1)
          echo "Supabase pingeado, sigue vivo."
